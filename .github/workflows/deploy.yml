name: Deploy to Production

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and Push Images
        run: |
          docker build -f docker/Dockerfile.server -t ${{ secrets.DOCKER_USERNAME }}/securerxchain-server:${{ github.ref_name }} ./server
          docker build -f docker/Dockerfile.client -t ${{ secrets.DOCKER_USERNAME }}/securerxchain-client:${{ github.ref_name }} ./client
          docker push ${{ secrets.DOCKER_USERNAME }}/securerxchain-server:${{ github.ref_name }}
          docker push ${{ secrets.DOCKER_USERNAME }}/securerxchain-client:${{ github.ref_name }}

      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/securerxchain
            docker-compose pull
            docker-compose up -d --force-recreate

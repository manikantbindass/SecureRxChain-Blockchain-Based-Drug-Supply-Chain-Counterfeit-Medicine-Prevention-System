name: SecureRxChain CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test-contracts:
    name: 🔗 Smart Contract Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: blockchain
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: blockchain/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Compile Contracts
        run: npx hardhat compile

      - name: Run Contract Tests
        run: npx hardhat test

      - name: Run Coverage
        run: npx hardhat coverage

  test-server:
    name: 🖥️ Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run Tests
        env:
          NODE_ENV: test
          MONGO_URI: mongodb://localhost:27017/securerxchain_test
          JWT_SECRET: test_secret_key_ci
        run: npm test

  build-client:
    name: ⚛️ Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Build React App
        env:
          REACT_APP_API_URL: http://localhost:5000
          REACT_APP_CHAIN_ID: '80001'
        run: npm run build

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-build
          path: client/build

  docker-build:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: [lint-and-test-contracts, test-server, build-client]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Server Image
        run: docker build -f docker/Dockerfile.server -t securerxchain-server ./server

      - name: Build Client Image
        run: docker build -f docker/Dockerfile.client -t securerxchain-client ./client

      - name: Build Blockchain Image
        run: docker build -f docker/Dockerfile.blockchain -t securerxchain-blockchain ./blockchain
